name: InventoryManagement CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: InventoryManagement

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore InventoryManagement/InventoryManagement.csproj
          dotnet restore InventoryManagement.Tests/InventoryManagement.Tests.csproj

      - name: Build web app
        run: dotnet build InventoryManagement/InventoryManagement.csproj --configuration Release --no-restore

      - name: Build tests
        run: dotnet build InventoryManagement.Tests/InventoryManagement.Tests.csproj --configuration Release --no-restore

      - name: Install Playwright browser
        run: pwsh InventoryManagement.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Test
        run: dotnet test InventoryManagement.Tests/InventoryManagement.Tests.csproj --configuration Release --no-build

      - name: Publish web app
        run: dotnet publish InventoryManagement/InventoryManagement.csproj --configuration Release --no-restore --output publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventory-management-web
          path: InventoryManagement/publish
